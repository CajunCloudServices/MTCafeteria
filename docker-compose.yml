services:
  web:
    build:
      context: .
      dockerfile: ./web/Dockerfile
    container_name: mtc_cafeteria_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_UPSTREAM_URL: http://api:4000
      APP_BASE_URL: ${APP_BASE_URL:-}
      READINESS_TIMEOUT_MS: ${WEB_READINESS_TIMEOUT_MS:-5000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/readyz').then((res)=>{if(!res.ok)process.exit(1);}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "${WEB_HOST_PORT:-3017}:3000"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mtc_cafeteria_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      USE_MOCK_DATA: ${USE_MOCK_DATA:-false}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      TASK_EDITOR_PASSWORD: ${TASK_EDITOR_PASSWORD:?TASK_EDITOR_PASSWORD is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((res)=>{if(!res.ok)process.exit(1);}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "127.0.0.1:${API_HOST_PORT:-4013}:4000"

  postgres:
    image: postgres:15-alpine
    container_name: mtc_cafeteria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mtc_cafeteria}
    volumes:
      - mtc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5436}:5432"

volumes:
  mtc_postgres_data:
